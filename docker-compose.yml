services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: minbasket
      POSTGRES_USER: minbasket
      POSTGRES_PASSWORD: minbasket
    volumes:
      - minbasket_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minbasket -d minbasket"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql+asyncpg://minbasket:minbasket@postgres:5432/minbasket
      JWT_SECRET: ${JWT_SECRET:-local-development-secret}
      APP_NAME: ${APP_NAME:-MinBasket}
      APP_DESCRIPTION: ${APP_DESCRIPTION:-Сравнение цен на продукты}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      FRONTEND_URL: http://localhost:3000
      BACKEND_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      NEXT_PUBLIC_USE_MOCK_API: "false"
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
      NEXT_PUBLIC_APP_NAME: ${APP_NAME:-MinBasket}
      NEXT_PUBLIC_APP_DESCRIPTION: ${APP_DESCRIPTION:-Сравнение цен на продукты}
      NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

  bot:
    build:
      context: .
      dockerfile: Dockerfile.bot
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      APP_NAME: ${APP_NAME:-MinBasket}
      APP_DESCRIPTION: ${APP_DESCRIPTION:-Сравнение цен на продукты}
      FRONTEND_URL: ${TELEGRAM_WEBAPP_URL:-http://localhost:3000}
    depends_on:
      backend:
        condition: service_healthy

volumes:
  minbasket_postgres:
